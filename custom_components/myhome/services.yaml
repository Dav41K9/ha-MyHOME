sync_time:
  name: Synchronize time
  description: Imposta l'orario del gateway sull'orario di Home Assistant.
  fields:
    gateway:
      name: Gateway
      description: MAC del gateway (es. 00:03:50:86:6B:6C).
      example: "00:03:50:86:6B:6C"
      selector:
        text:

send_message:
  name: Send message
  description: Invia un frame OpenWebNet arbitrario (ma valido) al gateway.
  fields:
    gateway:
      name: Gateway
      selector:
        text:
    message:
      name: Message
      example: "*1*0*0##"
      selector:
        text:

import_yaml:
  name: Import YAML
  description: Crea le subentry (dispositivi) leggendo un file myhome.yaml per i mac già configurati.
  fields:
    path:
      name: Path
      example: "/config/myhome.yaml"
      selector:
        text:

start_sending_instant_power:
  name: Start sending instant power
  description: Richiede aggiornamenti periodici di potenza istantanea per i sensori selezionati.
  target:
    entity:
      integration: myhome
      domain: sensor
  fields:
    duration:
      name: Duration
      description: Minuti (1-255).
      default: 65
      selector:
        number:
          min: 1
          max: 255