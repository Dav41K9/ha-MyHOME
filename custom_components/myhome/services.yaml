sync_time:
  name: Sincronizza orologio
  description: Sincronizza l'orologio del gateway MyHOME con l'ora di Home Assistant.
  fields:
    gateway_mac:
      name: MAC Gateway
      description: Indirizzo MAC del gateway (es. 00:03:50:86:6B:6C)
      required: true
      selector:
        text:

send_message:
  name: Invia messaggio OpenWebNet
  description: Invia un frame OpenWebNet raw al gateway specificato.
  fields:
    gateway_mac:
      name: MAC Gateway
      description: Indirizzo MAC del gateway (es. 00:03:50:86:6B:6C)
      required: true
      selector:
        text:
    message:
      name: Messaggio
      description: Frame OpenWebNet da inviare (es. *1*1*21##)
      required: true
      selector:
        text:

migrate_yaml:
  name: Migra da YAML
  description: Importa tutti i dispositivi dal vecchio file myhome.yaml come subentries. Eseguire una sola volta dopo aver aggiunto i gateway via UI.
